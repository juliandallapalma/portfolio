<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title"></title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0b;
    --bg-2: #141413;
    --text: #f0ede6;
    --text-muted: #7a7870;
    --text-mid: #b0ada5;
    --accent: #c8b89a;
    --border: rgba(240,237,230,0.08);
    --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 3rem;
    background: linear-gradient(to bottom, rgba(12,12,11,0.95) 0%, rgba(12,12,11,0) 100%);
  }

  .nav-name { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-mid); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 3rem 5rem;
    border-bottom: 1px solid var(--border);
  }

  .hero-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; }

  .hero h1 { font-size: clamp(3.5rem, 8vw, 7rem); font-weight: 300; line-height: 1.0; letter-spacing: -0.02em; margin-bottom: 2rem; }
  .hero h1 em { font-style: italic; color: var(--text-mid); }

  .hero-meta { display: flex; gap: 3rem; align-items: flex-end; }
  .hero-descriptor { font-size: 14px; line-height: 1.7; color: var(--text-muted); max-width: 380px; }
  .hero-stats { display: flex; gap: 2.5rem; margin-left: auto; }
  .stat { text-align: right; }
  .stat-num { font-size: 2rem; font-weight: 300; letter-spacing: -0.02em; line-height: 1; }
  .stat-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

  .section-header { display: flex; justify-content: space-between; align-items: baseline; padding: 4rem 3rem 2rem; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); }
  .section-count { font-size: 11px; letter-spacing: 0.1em; color: var(--text-muted); }

  .work-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }

  .work-tile { position: relative; overflow: hidden; aspect-ratio: 4/3; cursor: pointer; background: var(--bg-2); }
  .work-tile.featured { grid-column: span 2; aspect-ratio: 8/3; }

  /* --- MOBILE (768px and under) --- */
@media (max-width: 768px) {

  /* stack tiles into a single full-width column instead of 3 */
  .work-grid { grid-template-columns: 1fr; }

  /* reset featured (wide) tiles to single column, same ratio as regular tiles */
  .work-tile,
  .work-tile.featured { grid-column: span 1; aspect-ratio: 4/3; }

  /* always show tile details — no hover on touch screens */
  .work-tile .tile-details { max-height: 120px; opacity: 1; }

}

  .tile-bg { width: 100%; height: 100%; object-fit: cover; display: block; position: absolute; inset: 0; transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94); filter: grayscale(20%); }
  .work-tile:hover .tile-bg { transform: scale(1.04); filter: grayscale(0%); }

  .tile-placeholder { width: 100%; height: 100%; position: absolute; inset: 0; transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  .work-tile:hover .tile-placeholder { transform: scale(1.04); }

  .tile-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(12,12,11,0.95) 0%, rgba(12,12,11,0.5) 40%, rgba(12,12,11,0.0) 70%); }

  .tile-content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem; }
  .tile-brand { font-size: 18px; font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); margin-bottom: 0.3rem; }
  .tile-event { font-size: 12px; color: var(--text-mid); letter-spacing: 0.04em; }

  .tile-details { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.4s ease, opacity 0.35s ease; }
  .work-tile:hover .tile-details { max-height: 120px; opacity: 1; }

  .tile-details-inner { padding-top: 0.75rem; font-size: 11.5px; line-height: 1.6; color: var(--text-muted); border-top: 1px solid rgba(240,237,230,0.15); margin-top: 0.75rem; }
  .tile-details-inner .role { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }

  .about-section { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border); }
  .about-left { padding: 5rem 3rem; border-right: 1px solid var(--border); }
  .about-right { padding: 5rem 3rem; }

  .about-heading { font-size: clamp(2rem, 4vw, 3.5rem); font-weight: 300; line-height: 1.15; letter-spacing: -0.01em; margin-bottom: 2rem; }
  .about-heading em { font-style: italic; color: var(--text-mid); }
  .about-body { font-size: 15px; line-height: 1.8; color: var(--text-muted); max-width: 420px; white-space: pre-line; }

  .expertise-list { list-style: none; margin-top: 3rem; }
  .expertise-list li { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-mid); letter-spacing: 0.02em; }
  .expertise-list li:first-child { border-top: 1px solid var(--border); }
  .expertise-list .tag { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }

  .contact-section { padding: 5rem 3rem; display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid var(--border); }
  .contact-heading { font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 300; letter-spacing: -0.02em; line-height: 1.1; }
  .contact-heading em { font-style: italic; color: var(--text-mid); }

  .contact-links { display: flex; flex-direction: column; align-items: flex-end; gap: 1rem; }
  .contact-link { font-size: 13px; letter-spacing: 0.08em; color: var(--text-muted); text-decoration: none; transition: color 0.2s; display: flex; align-items: center; gap: 0.75rem; }
  .contact-link:hover { color: var(--text); }
  .contact-link::before { content: ''; display: block; width: 20px; height: 1px; background: var(--text-muted); transition: width 0.3s; }
  .contact-link:hover::before { width: 40px; }

  footer { padding: 2rem 3rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
  footer span { font-size: 11px; letter-spacing: 0.08em; color: var(--text-muted); }
</style>
</head>
<body>

<nav>
  <span class="nav-name"></span>
  <ul class="nav-links">
    <li><a href="#work">Work</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <p class="hero-label"></p>
  <h1></h1>
  <div class="hero-meta">
    <p class="hero-descriptor"></p>
    <div class="hero-stats"></div>
  </div>
</section>

<section id="work">
  <div class="section-header">
    <span class="section-title">Selected Work</span>
    <span class="section-count"></span>
  </div>
  <div class="work-grid"></div>
</section>

<section id="about" class="about-section">
  <div class="about-left">
    <h2 class="about-heading"></h2>
    <p class="about-body"></p>
  </div>
  <div class="about-right">
    <ul class="expertise-list"></ul>
  </div>
</section>

<section id="contact" class="contact-section">
  <div>
    <h2 class="contact-heading">Let's work<br><em>together.</em></h2>
  </div>
  <div class="contact-links"></div>
</section>

<footer>
  <span class="footer-name"></span>
  <span class="footer-location"></span>
</footer>

<script src="data.js"></script>
<script>
  // --- Helpers ---
  const el  = (sel) => document.querySelector(sel);
  const els = (sel) => document.querySelectorAll(sel);

  // --- Page title + nav ---
  document.getElementById('page-title').textContent = `${SITE.name} — Technical Operations`;
  el('.nav-name').textContent = SITE.name;

  // --- Hero ---
  el('.hero-label').textContent = SITE.role;
  el('.hero h1').innerHTML =
    `${SITE.tagline[0]}<br><em>${SITE.tagline[1]}</em><br>${SITE.tagline[2]}`;
  el('.hero-descriptor').textContent = SITE.bio;

  el('.hero-stats').innerHTML = SITE.stats.map(s => `
    <div class="stat">
      <div class="stat-num">${s.number}</div>
      <div class="stat-label">${s.label}</div>
    </div>
  `).join('');

  // --- Work grid ---
  el('.section-count').textContent =
    String(SITE.work.length).padStart(2, '0') + ' Projects';

  el('.work-grid').innerHTML = SITE.work.map(tile => {
    const bg = tile.image
      ? `<img src="${tile.image}" alt="${tile.brand} activation" class="tile-bg">`
      : `<div class="tile-placeholder" style="background:${tile.placeholderColor || '#141413'};"></div>`;

    return `
      <div class="work-tile${tile.featured ? ' featured' : ''}">
        ${bg}
        <div class="tile-overlay"></div>
        <div class="tile-content">
          <div class="tile-brand">${tile.brand}</div>
          <div class="tile-event">${tile.event}</div>
          <div class="tile-details">
            <div class="tile-details-inner">
              <div class="role">${tile.role}</div>
              ${tile.detail}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  // --- About ---
  el('.about-heading').innerHTML =
    `${SITE.aboutHeading[0]}<br><em>${SITE.aboutHeading[1]}</em>`;
  el('.about-body').textContent = SITE.aboutBody;

  el('.expertise-list').innerHTML = SITE.expertise.map(e => `
    <li>${e.skill} <span class="tag">${e.tag}</span></li>
  `).join('');

  // --- Contact ---
  el('.contact-links').innerHTML = `
    <a class="contact-link" href="mailto:${SITE.email}">${SITE.email}</a>
    <a class="contact-link" href="${SITE.linkedin}" target="_blank">LinkedIn</a>
    <a class="contact-link" href="tel:${SITE.phone.replace(/\s/g,'')}">${SITE.phone}</a>
  `;

  // --- Footer ---
  el('.footer-name').textContent     = `${SITE.name} — Technical Operations`;
  el('.footer-location').textContent = SITE.location;
</script>

</body>
</html>
